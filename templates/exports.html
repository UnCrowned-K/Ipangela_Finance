<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exports - Profit Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .exports-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .exports-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .exports-header h1 {
            color: #333;
        }
        .back-link {
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            border-radius: 5px;
            background: #fff;
        }
        .file-item:hover {
            background: #f9f9f9;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .file-name {
            font-weight: 500;
            color: #333;
        }
        .file-size {
            color: #666;
            font-size: 12px;
        }
        .download-btn {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .download-btn:hover {
            background: #0056b3;
        }
        .empty-folder {
            text-align: center;
            color: #666;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="exports-container">
        <div class="exports-header">
            <h1>Export Files</h1>
            <a href="{{ url_for('optimizer') }}" class="back-link">← Back to Optimizer</a>
        </div>
        
        {% if files %}
        <ul class="file-list">
            {% for file in files %}
            <li class="file-item">
                <div class="file-info">
                    <span class="file-name">{{ file.name }}</span>
                    <span class="file-size">{{ (file.size / 1024)|round(2) }} KB</span>
                </div>
                <a href="{{ url_for('download_file', filename=file.name) }}" class="download-btn">
                    <i data-lucide="download"></i> Download
                </a>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <div class="empty-folder">
            <p>No files in the exports folder yet.</p>
            <p>Export files from the Optimizer to see them here.</p>
        </div>
        {% endif %}
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
